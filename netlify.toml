[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/admin/content"
  to = "/.netlify/functions/admin-content"
  status = 200
  force = true

[[redirects]]
  from = "/api/admin/content/:slug"
  to = "/.netlify/functions/admin-content/:slug"
  status = 200
  force = true
